<!DOCTYPE html>
<html>
<head>
<title>KL Study Hub</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0B0F1A;
  color:white;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:rgba(255,255,255,0.05);
}

.logo{font-weight:bold;font-size:18px;}

.nav a{
  color:white;
  margin-right:15px;
  text-decoration:none;
}

.nav a:hover{color:cyan;}

.logout{color:#ff4d4d;cursor:pointer;}

/* HERO */
.hero{text-align:center;margin-top:20px;}

/* SEARCH */
.searchBox{text-align:center;margin:20px;}
input,select{padding:10px;margin:5px;border-radius:6px;border:none;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}
.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 15px cyan;
}
.card.active{border:1px solid cyan;}

/* RESOURCES */
.resources{
  max-height:0;
  overflow:hidden;
  transition:0.3s;
}
.resources.show{
  max-height:300px;
  margin-top:10px;
}

.item{margin-top:8px;}
button{margin-left:5px;padding:4px 8px;cursor:pointer;}

/* SECTION */
.section{padding:20px;}
.section h3{color:cyan;}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  background:rgba(255,255,255,0.05);
  margin-top:20px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">
    KL <span style="color:cyan;">STUDY HUB</span>
  </div>

  <div>
    <a href="help.html">Help</a>
    <a href="privacy.html">Privacy</a>
    <span class="logout" onclick="logout()">Logout</span>
  </div>
</div>

<div class="hero">
  <h2 id="welcome"></h2>
</div>

<div class="searchBox">
  <input id="search" placeholder="Search..." oninput="render()">
  <select id="filter" onchange="render()">
    <option value="all">All</option>
    <option value="pdf">PDF</option>
    <option value="link">Links</option>
  </select>
</div>

<!-- FAVORITES -->
<div class="section">
  <h3>⭐ Favorites</h3>
  <div id="favorites"></div>
</div>

<!-- RECENT -->
<div class="section">
  <h3>👁 Recently Viewed</h3>
  <div id="recent"></div>
</div>

<!-- BRANCH GRID -->
<div class="grid" id="grid"></div>

<!-- 🔥 RESOURCE FEED -->
<div class="section">
  <h3>📚 Explore More Resources</h3>
  <div id="feed"></div>
</div>

<!-- 📊 STATS -->
<div class="section">
  <h3>📊 Dashboard Stats</h3>
  <p id="stats"></p>
</div>

<!-- FOOTER -->
<div class="footer">
  KL Study Hub © 2026 | Contact: klstudyhub45@gmail.com
</div>

<script>

const { createClient } = supabase;

const client = createClient(
"https://jkgkswsiunpzwnurqvjq.supabase.co",
"sb_publishable_khKSlOrpjH8f44Z5Dls3mw_QfpSthr8"
);

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location="index.html";
}

document.getElementById("welcome").innerText =
"Welcome " + user.id_no + " (" + user.branch + ")";

let allData=[];
let favorites=JSON.parse(localStorage.getItem("fav")||"[]");
let recent=JSON.parse(localStorage.getItem("recent")||"[]");

const branches=["CSE","ECE","EEE","AIDS","CSIT"];

async function load(){
  const { data } = await client.from("resources").select("*");
  allData=data;
  render();
}

function render(){

  const search=searchBox.value.toLowerCase();
  const filter=document.getElementById("filter").value;

  grid.innerHTML="";
  feed.innerHTML="";

  branches.forEach(b=>{

    const list=allData.filter(r=>{
      return r.branch===b &&
      r.title.toLowerCase().includes(search) &&
      (filter==="all" ||
      (filter==="pdf" && r.link.includes(".pdf")) ||
      (filter==="link" && !r.link.includes(".pdf")));
    });

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`<h3>${b} (${list.length})</h3><div class="resources"></div>`;

    const box=card.querySelector(".resources");

    if(list.length===0){
      box.innerHTML="No resources";
    }else{
      list.forEach(r=>{
        box.innerHTML+=createItem(r);
      });
    }

    card.onclick=()=>{
      document.querySelectorAll(".card").forEach(c=>{
        c.classList.remove("active");
        c.querySelector(".resources").classList.remove("show");
      });
      card.classList.add("active");
      box.classList.toggle("show");
    };

    grid.appendChild(card);
  });

  // FEED
  allData.slice(0,10).forEach(r=>{
    feed.innerHTML+=createItem(r);
  });

  renderFav();
  renderRecent();

  stats.innerText =
  "Total Resources: "+allData.length+
  " | Favorites: "+favorites.length+
  " | Viewed: "+recent.length;
}

function createItem(r){
  return `
  <div class="item">
    ${r.link.includes(".pdf")?"📄":"🔗"} ${r.title}
    <button onclick="openRes('${r.link}')">Open</button>
    <button onclick="copyLink('${r.link}')">Copy</button>
    <button onclick="fav('${r.link}','${r.title}')">⭐</button>
  </div>`;
}

function openRes(link){
  window.open(link,"_blank");
  recent.unshift(link);
  recent=[...new Set(recent)].slice(0,5);
  localStorage.setItem("recent",JSON.stringify(recent));
}

function copyLink(link){
  navigator.clipboard.writeText(link);
  alert("Copied");
}

function fav(link,title){
  favorites.push({link,title});
  localStorage.setItem("fav",JSON.stringify(favorites));
}

function renderFav(){
  favoritesDiv.innerHTML="";
  favorites.forEach(f=>{
    favoritesDiv.innerHTML+=`<div>${f.title}</div>`;
  });
}

function renderRecent(){
  recentDiv.innerHTML="";
  recent.forEach(r=>{
    recentDiv.innerHTML+=`<div>${r}</div>`;
  });
}

function logout(){
  localStorage.removeItem("user");
  window.location="index.html";
}

load();

</script>

</body>
</html>
