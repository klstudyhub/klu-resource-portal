<!DOCTYPE html>
<html>
<head>
<title>KLU Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0B0F1A;
  color:white;
  overflow:hidden;
}

/* BACKGROUND */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
}

.logo{font-weight:bold;}
.logout{color:#ff4d4d;cursor:pointer;}

/* HERO */
.hero{
  text-align:center;
  margin-top:30px;
}

.hero h1{
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 10px cyan;}
  to{ text-shadow:0 0 30px cyan;}
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  padding:30px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  padding:20px;
  cursor:pointer;
  transition:0.4s;
  position:relative;
  overflow:hidden;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
  box-shadow:0 0 30px rgba(0,255,255,0.3);
}

.card.active{
  border:1px solid cyan;
}

/* GLOW EFFECT */
.card::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:linear-gradient(45deg,transparent,cyan,transparent);
  top:-50%;
  left:-50%;
  opacity:0;
  transition:0.5s;
}

.card:hover::before{
  opacity:0.2;
}

/* RESOURCES */
.resources{
  max-height:0;
  overflow:hidden;
  transition:0.4s;
}

.resources.show{
  max-height:300px;
  margin-top:10px;
}

.resources a{
  display:block;
  color:cyan;
  margin-top:6px;
  text-decoration:none;
}

.resources a:hover{
  text-decoration:underline;
}

/* LOADER */
.loader{
  text-align:center;
  margin-top:40px;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{opacity:0.3}
  50%{opacity:1}
  100%{opacity:0.3}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="nav">
  <div class="logo">KLU Resources</div>
  <div class="logout" onclick="logout()">Logout</div>
</div>

<div class="hero">
  <h1 id="welcome"></h1>
  <p>Access your branch resources</p>
</div>

<div id="loader" class="loader">Loading...</div>

<div id="grid" class="grid" style="display:none;"></div>

<script>

// SUPABASE
const { createClient } = supabase;

const client = createClient(
  "https://jkgkswsiunpzwnurqvjq.supabase.co",
  "sb_publishable_khKSlOrpjH8f44Z5Dls3mw_QfpSthr8"
);

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location="index.html";
}

document.getElementById("welcome").innerText =
  "Welcome " + user.id_no;

// PARTICLES
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<60;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:Math.random()-0.5,
    dy:Math.random()-0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="cyan";
    ctx.fill();

    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
  });

  requestAnimationFrame(animate);
}
animate();

// GRID
const branches = ["CSE","ECE","EEE","AIDS","CSIT"];
const grid = document.getElementById("grid");

branches.forEach(b=>{
  const card = document.createElement("div");
  card.className="card";

  card.innerHTML = `
    <h3>${b}</h3>
    <div class="resources" id="${b}"></div>
  `;

  card.onclick = function(){

    document.querySelectorAll(".card").forEach(c=>{
      c.classList.remove("active");
      c.querySelector(".resources").classList.remove("show");
    });

    card.classList.add("active");
    card.querySelector(".resources").classList.toggle("show");
  };

  grid.appendChild(card);
});

// LOAD DATA
async function load(){
  const { data } = await client.from("resources").select("*");

  data.forEach(item=>{
    const el = document.getElementById(item.branch);
    if(el){
      el.innerHTML += `<a href="${item.link}" target="_blank">${item.title}</a>`;
    }
  });

  document.getElementById("loader").style.display="none";
  grid.style.display="grid";
}

load();

// LOGOUT
function logout(){
  localStorage.removeItem("user");
  window.location="index.html";
}

</script>

</body>
</html>
