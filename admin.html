<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  background:#0B0F1A;
  color:white;
  font-family:Arial;
  text-align:center;
}

.container {
  width:500px;
  margin:auto;
  margin-top:50px;
}

button {
  padding:8px 12px;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="container">

<h2>Admin Panel</h2>

<h3>Pending Users</h3>
<div id="users"></div>

</div>

<script>

const supabase = window.supabase.createClient(
  "https://jkgkswsiunpzwnurqvjq.supabase.co",
  "sb_publishable_khKSlOrpjH8f44Z5Dls3mw_QfpSthr8"
);

// LOAD USERS
async function loadUsers() {
  const { data } = await supabase
    .from("users")
    .select("*")
    .eq("status", "pending");

  const container = document.getElementById("users");
  container.innerHTML = "";

  data.forEach(user => {
    container.innerHTML += `
      <p>
        ${user.id_no} (${user.branch})
        <button onclick="approve('${user.id_no}')">Approve</button>
      </p>
    `;
  });
}

// APPROVE USER
async function approve(id_no) {
  await supabase
    .from("users")
    .update({ status: "approved" })
    .eq("id_no", id_no);

  alert("User Approved");
  loadUsers();
}

loadUsers();

</script>

</body>
</html>
