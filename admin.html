<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  background:#0B0F1A;
  color:white;
  font-family:Arial;
  text-align:center;
}

.container {
  width:500px;
  margin:auto;
  margin-top:50px;
}

button {
  padding:8px 12px;
  margin-top:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>Admin Panel</h2>

<h3>Pending Users</h3>
<div id="users"></div>

</div>

<script>

// 🔥 CONNECT SUPABASE
const { createClient } = supabase;

const client = createClient(
  "https://jkgkswsiunpzwnurqvjq.supabase.co",
  "sb_publishable_khKSlOrpjH8f44Z5Dls3mw_QfpSthr8"
);

// LOAD USERS
async function loadUsers(){

  console.log("Loading users...");

  const { data, error } = await client
    .from("users")
    .select("*")
    .eq("status", "pending");

  console.log(data, error);

  const container = document.getElementById("users");
  container.innerHTML = "";

  if(!data || data.length === 0){
    container.innerHTML = "<p>No pending users</p>";
    return;
  }

  data.forEach(user => {
    container.innerHTML += `
      <p>
        ${user.id_no} (${user.branch})
        <button onclick="approve('${user.id_no}')">Approve</button>
      </p>
    `;
  });
}

// APPROVE USER
async function approve(id){

  await client
    .from("users")
    .update({ status: "approved" })
    .eq("id_no", id);

  alert("User Approved");

  loadUsers();
}

// LOAD ON START
loadUsers();

</script>

</body>
</html>
