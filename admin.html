<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  background:#0B0F1A;
  color:white;
  font-family:Arial;
  text-align:center;
}

.container {
  width:500px;
  margin:auto;
  margin-top:30px;
}

input,select,button {
  padding:10px;
  margin-top:10px;
  width:90%;
}

.list {
  margin-top:20px;
}

.item {
  background:rgba(255,255,255,0.05);
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Admin Panel</h2>

<!-- ADD -->
<h3>Add Resource</h3>

<input id="title" placeholder="Title">
<input id="link" placeholder="Link">

<select id="branch">
<option>CSE</option>
<option>ECE</option>
<option>EEE</option>
<option>AIDS</option>
<option>CSIT</option>
</select>

<button onclick="add()">Upload</button>

<!-- SEARCH -->
<h3>Search</h3>
<input id="search" placeholder="Search..." oninput="load()">

<!-- LIST -->
<div class="list" id="list"></div>

</div>

<script>

const { createClient } = supabase;

const client = createClient(
  "https://jkgkswsiunpzwnurqvjq.supabase.co",
  "sb_publishable_khKSlOrpjH8f44Z5Dls3mw_QfpSthr8"
);

// ADD
async function add(){

  await client.from("resources").insert([{
    title: title.value,
    link: link.value,
    branch: branch.value
  }]);

  alert("Uploaded");
  title.value="";
  link.value="";
  load();
}

// DELETE
async function remove(id){

  await client.from("resources").delete().eq("id", id);

  load();
}

// LOAD
async function load(){

  const { data } = await client.from("resources").select("*");

  const searchValue = document.getElementById("search").value.toLowerCase();

  const list = document.getElementById("list");
  list.innerHTML="";

  data.forEach(item => {

    if(item.title.toLowerCase().includes(searchValue)){

      list.innerHTML += `
        <div class="item">
          <b>${item.title}</b> (${item.branch})<br>
          <a href="${item.link}" target="_blank" style="color:cyan">Open</a><br>
          <button onclick="remove('${item.id}')">Delete</button>
        </div>
      `;
    }

  });

}

load();

</script>

</body>
</html>
