<!DOCTYPE html>
<html>
<head>
<title>KLU Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0B0F1A;
  color:white;
}

.nav{
  text-align:center;
  padding:15px;
  background:rgba(255,255,255,0.05);
}

.tabs{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:20px;
}

.tab{
  padding:10px 20px;
  cursor:pointer;
  background:rgba(255,255,255,0.05);
  border-radius:8px;
}

.tab.active{
  background:cyan;
  color:black;
}

.section{
  display:none;
  padding:20px;
  max-width:700px;
  margin:auto;
}

.section.active{
  display:block;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:rgba(255,255,255,0.05);
  border:1px solid transparent;
  color:white;
  border-radius:8px;
}

input:focus{
  outline:none;
  border:1px solid cyan;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:linear-gradient(45deg,cyan,#00ffaa);
  border:none;
  border-radius:8px;
  color:black;
  font-weight:bold;
}

.item{
  background:rgba(255,255,255,0.05);
  padding:12px;
  margin-top:10px;
  border-radius:10px;
}

/* COUNT BADGES */
.count{
  color:cyan;
  font-size:14px;
}
</style>
</head>

<body>

<div class="nav">⚡ KLU Admin Panel</div>

<div class="tabs">
  <div class="tab active" onclick="openTab('stats')">Stats</div>
  <div class="tab" onclick="openTab('users')">Users</div>
  <div class="tab" onclick="openTab('resources')">Resources</div>
  <div class="tab" onclick="openTab('active')">Active</div>
</div>

<!-- STATS -->
<div id="stats" class="section active">
  <h3><i class="fa fa-chart-bar"></i> Statistics</h3>
  <p>Total Users: <span id="userCount"></span></p>
  <p>Total Resources: <span id="resCount"></span></p>
</div>

<!-- USERS -->
<div id="users" class="section">

  <h3><i class="fa fa-users"></i> User Management</h3>

  <input id="userSearch" placeholder="Search users..." oninput="loadUsers()">

  <h4>🟡 Pending <span class="count" id="pendingCount"></span></h4>
  <div id="pendingList"></div>

  <h4>🟢 Approved <span class="count" id="approvedCount"></span></h4>
  <div id="approvedList"></div>

  <h4>🔴 Blocked <span class="count" id="blockedCount"></span></h4>
  <div id="blockedList"></div>

</div>

<!-- RESOURCES -->
<div id="resources" class="section">

  <h3><i class="fa fa-upload"></i> Upload Resource</h3>

  <input id="title" placeholder="Title">
  <input id="link" placeholder="Optional Link">
  <input type="file" id="file">

  <select id="branch">
    <option>CSE</option>
    <option>ECE</option>
    <option>EEE</option>
    <option>AIDS</option>
    <option>CSIT</option>
  </select>

  <button onclick="add()">Upload</button>

  <input id="search" placeholder="Search..." oninput="loadResources()">

  <div id="resList"></div>

</div>

<!-- ACTIVE -->
<div id="active" class="section">
  <h3>🟢 Active Users</h3>
  <div id="activeList"></div>
</div>

<script>

const { createClient } = supabase;

const client = createClient(
  "https://jkgkswsiunpzwnurqvjq.supabase.co",
  "sb_publishable_khKSlOrpjH8f44Z5Dls3mw_QfpSthr8"
);

// ACCESS CONTROL
const user = JSON.parse(localStorage.getItem("user"));

if(!user || (user.role !== "admin" && user.role !== "coadmin")){
  window.location="index.html";
}

// TABS
function openTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));

  event.target.classList.add("active");
  document.getElementById(name).classList.add("active");
}

// STATS
async function loadStats(){
  const users = await client.from("users").select("*");
  const res = await client.from("resources").select("*");

  userCount.innerText = users.data.length;
  resCount.innerText = res.data.length;
}

// USERS WITH COUNTS
async function loadUsers(){

  const { data } = await client.from("users").select("*");

  const search = userSearch.value.toLowerCase();

  pendingList.innerHTML="";
  approvedList.innerHTML="";
  blockedList.innerHTML="";

  let pending = 0, approved = 0, blocked = 0;

  data.forEach(u=>{

    if(!u.id_no.toLowerCase().includes(search)) return;

    const html = `
      <div class="item">
        <b>${u.id_no}</b> (${u.branch})<br>
        Role: ${u.role}<br>

        ${u.status === "pending" ? 
          `<button onclick="approve('${u.id_no}')">Approve</button>` : ""}

        ${u.status !== "blocked" ? 
          `<button onclick="blockUser('${u.id_no}')">Block</button>` : ""}

        ${u.status === "blocked" ? 
          `<button onclick="unblockUser('${u.id_no}')">Unblock</button>` : ""}

        ${u.role !== "admin" ? 
          `<button onclick="removeUser('${u.id_no}')">Delete</button>` : ""}
      </div>
    `;

    if(u.status === "pending"){
      pending++;
      pendingList.innerHTML += html;
    }
    else if(u.status === "approved"){
      approved++;
      approvedList.innerHTML += html;
    }
    else if(u.status === "blocked"){
      blocked++;
      blockedList.innerHTML += html;
    }

  });

  pendingCount.innerText = `(${pending})`;
  approvedCount.innerText = `(${approved})`;
  blockedCount.innerText = `(${blocked})`;
}

// ACTIONS
async function approve(id){
  await client.from("users").update({status:"approved"}).eq("id_no",id);
  loadUsers();
}

async function blockUser(id){
  await client.from("users").update({status:"blocked"}).eq("id_no",id);
  loadUsers();
}

async function unblockUser(id){
  await client.from("users").update({status:"approved"}).eq("id_no",id);
  loadUsers();
}

async function removeUser(id){
  if(!confirm("Delete user permanently?")) return;
  await client.from("users").delete().eq("id_no",id);
  loadUsers();
}

// RESOURCE ADD
async function add(){

  if(!title.value){
    alert("Enter title");
    return;
  }

  let fileUrl = link.value;

  const fileInput = document.getElementById("file");

  if(fileInput.files.length > 0){

    const file = fileInput.files[0];
    const fileName = Date.now() + "_" + file.name;

    const { error } = await client.storage.from("files").upload(fileName, file);

    if(error){
      alert("Upload failed");
      return;
    }

    const { data } = client.storage.from("files").getPublicUrl(fileName);
    fileUrl = data.publicUrl;
  }

  if(!fileUrl){
    alert("Provide link or file");
    return;
  }

  await client.from("resources").insert([{
    title: title.value,
    link: fileUrl,
    branch: branch.value
  }]);

  title.value="";
  link.value="";
  fileInput.value="";

  loadResources();
}

// DELETE RESOURCE
async function del(id){
  await client.from("resources").delete().eq("id",id);
  loadResources();
}

// LOAD RESOURCES
async function loadResources(){

  const { data } = await client
    .from("resources")
    .select("*")
    .order("created_at",{ascending:false});

  const s = search.value.toLowerCase();

  resList.innerHTML="";

  data.forEach(r=>{
    if(r.title.toLowerCase().includes(s)){
      resList.innerHTML += `
        <div class="item">
          <b>${r.title}</b> (${r.branch})<br>
          <a href="${r.link}" target="_blank">Open</a><br>
          <button onclick="del('${r.id}')">Delete</button>
        </div>
      `;
    }
  });
}

// ACTIVE USERS
async function loadActive(){

  const now = new Date();
  const { data } = await client.from("users").select("*");

  activeList.innerHTML="";

  data.forEach(u=>{
    if(u.last_active){
      const diff = (now - new Date(u.last_active))/1000;
      if(diff < 10){
        activeList.innerHTML += `<div class="item">${u.id_no} 🟢</div>`;
      }
    }
  });
}

// INIT
loadStats();
loadUsers();
loadResources();
setInterval(loadActive,5000);

</script>

</body>
</html>
