<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#03050a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
<title>KL Study Hub — Quick Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#03050a;--s1:#070c16;
  --card:rgba(255,255,255,0.024);--ch:rgba(255,255,255,0.044);
  --border:rgba(255,255,255,0.058);
  --p:#00f5b4;--pd:rgba(0,245,180,0.07);--pg:rgba(0,245,180,0.14);
  --gold:#ffd166;--goldd:rgba(255,209,102,0.09);
  --rose:#ff6b9d;--red:#ff5b5b;--redd:rgba(255,91,91,0.09);
  --blue:#5b9fff;--blued:rgba(91,159,255,0.09);
  --purple:#b57bff;--purpled:rgba(181,123,255,0.09);
  --tx:#e5edf8;--mu:rgba(229,237,248,0.38);--su:rgba(229,237,248,0.17);
  --r:14px;--rs:10px;--rp:999px;
  --fd:'Space Grotesk',sans-serif;--fh:'Orbitron',sans-serif;
  --eo:cubic-bezier(0.16,1,0.3,1);
}
html{scroll-behavior:smooth;}
body{font-family:var(--fd);background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-m{position:absolute;inset:0;background:radial-gradient(ellipse 70% 55% at 5% 10%,rgba(181,123,255,0.04) 0%,transparent 55%),radial-gradient(ellipse 55% 45% at 95% 85%,rgba(0,245,180,0.03) 0%,transparent 55%);animation:bgD 32s ease-in-out infinite alternate;}
@keyframes bgD{from{transform:scale(1);}to{transform:scale(1.06) rotate(1deg);}}
.bg-g{position:absolute;inset:0;background-image:linear-gradient(rgba(181,123,255,0.011) 1px,transparent 1px),linear-gradient(90deg,rgba(181,123,255,0.011) 1px,transparent 1px);background-size:68px 68px;mask-image:radial-gradient(ellipse 70% 80% at 50% 40%,black 10%,transparent 100%);}

/* NAV */
nav{position:relative;z-index:200;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:rgba(3,5,10,0.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:var(--fh);font-size:16px;font-weight:900;display:flex;align-items:center;gap:8px;color:var(--tx);text-decoration:none;}
.nav-dot{width:7px;height:7px;border-radius:50%;background:var(--p);box-shadow:0 0 10px var(--p);animation:blink 1.8s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.35;transform:scale(0.65);}}
.nav-logo .acc{color:var(--p);}
.nav-r{display:flex;align-items:center;gap:6px;}
.nav-btn{padding:6px 13px;border-radius:8px;font-size:12.5px;font-weight:500;color:var(--mu);background:transparent;border:none;cursor:pointer;font-family:var(--fd);transition:color 0.18s,background 0.18s;text-decoration:none;display:flex;align-items:center;gap:6px;}
.nav-btn:hover{color:var(--tx);background:rgba(255,255,255,0.05);}
.save-indicator{font-size:11.5px;color:var(--mu);display:flex;align-items:center;gap:5px;transition:color 0.2s;}
.save-indicator.saved{color:var(--p);}

/* LAYOUT */
.app-layout{position:relative;z-index:1;display:flex;height:calc(100vh - 62px);}

/* SIDEBAR */
.sidebar{width:270px;min-width:270px;background:rgba(7,12,22,0.7);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-hd{padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sidebar-hd h2{font-family:var(--fh);font-size:13px;font-weight:700;margin-bottom:10px;}
.new-btn{width:100%;padding:9px;border-radius:10px;background:linear-gradient(135deg,var(--purple),#8a4fff);border:none;color:#fff;font-family:var(--fh);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all 0.2s;}
.new-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(181,123,255,0.3);}
.note-search{margin-top:9px;width:100%;padding:8px 12px;background:rgba(0,0,0,0.28);border:1px solid var(--border);border-radius:9px;color:var(--tx);font-family:var(--fd);font-size:12.5px;outline:none;transition:border-color 0.18s;}
.note-search::placeholder{color:var(--su);}
.note-search:focus{border-color:rgba(181,123,255,0.3);}
.notes-list{flex:1;overflow-y:auto;padding:8px;}
.notes-list::-webkit-scrollbar{width:3px;}
.notes-list::-webkit-scrollbar-thumb{background:rgba(181,123,255,0.18);border-radius:3px;}
.note-item{padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent;transition:all 0.16s;margin-bottom:4px;position:relative;}
.note-item:hover{background:var(--ch);border-color:var(--border);}
.note-item.active{background:var(--purpled);border-color:rgba(181,123,255,0.22);}
.note-item-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.note-item.active .note-item-title{color:var(--purple);}
.note-item-preview{font-size:11px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-item-date{font-size:10px;color:var(--su);margin-top:3px;}
.note-delete{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:6px;background:transparent;border:none;color:var(--mu);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:11px;transition:all 0.15s;}
.note-item:hover .note-delete{display:flex;}
.note-delete:hover{background:var(--redd);color:var(--red);}
.empty-notes{padding:24px 14px;text-align:center;color:var(--mu);font-size:12.5px;}
.empty-notes .en-icon{font-size:28px;margin-bottom:8px;}

/* EDITOR */
.editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.editor-toolbar{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:rgba(3,5,10,0.5);}
.note-title-input{flex:1;background:transparent;border:none;color:var(--tx);font-family:var(--fh);font-size:15px;font-weight:700;outline:none;}
.note-title-input::placeholder{color:var(--su);}
.tb-btn{width:28px;height:28px;border-radius:7px;background:var(--card);border:1px solid var(--border);color:var(--mu);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all 0.15s;flex-shrink:0;}
.tb-btn:hover{background:var(--purpled);color:var(--purple);border-color:rgba(181,123,255,0.22);}
.word-count{font-size:11px;color:var(--su);white-space:nowrap;}
.note-editor{flex:1;padding:22px 28px;background:transparent;border:none;color:var(--tx);font-family:var(--fd);font-size:14px;line-height:1.8;outline:none;resize:none;width:100%;overflow-y:auto;}
.note-editor::placeholder{color:var(--su);}
.note-editor::-webkit-scrollbar{width:4px;}
.note-editor::-webkit-scrollbar-thumb{background:rgba(181,123,255,0.14);border-radius:4px;}

/* NO NOTE SELECTED */
.no-note{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--mu);font-size:13px;gap:10px;text-align:center;padding:28px;}
.no-note .nn-icon{font-size:44px;margin-bottom:4px;}
.no-note .nn-hint{font-size:12px;color:var(--su);}

/* TOAST */
.tw{position:fixed;top:80px;right:20px;display:flex;flex-direction:column;gap:9px;z-index:9999;}
.tn{display:flex;align-items:center;gap:11px;padding:11px 16px;border-radius:var(--r);background:rgba(7,12,22,0.97);backdrop-filter:blur(20px);border:1px solid var(--border);border-left:3px solid var(--p);box-shadow:0 13px 42px rgba(0,0,0,0.5);min-width:220px;animation:tIn 0.4s var(--eo);}
.tn.hiding{animation:tOut 0.28s ease forwards;}
@keyframes tIn{from{transform:translateX(110%);opacity:0;}to{transform:none;opacity:1;}}
@keyframes tOut{to{transform:translateX(110%);opacity:0;}}
.ti{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;background:rgba(0,245,180,0.12);color:var(--p);}
.tm{font-size:12.5px;font-weight:500;flex:1;}

@media(max-width:640px){
  .sidebar{width:100%;min-width:unset;position:fixed;bottom:0;top:auto;left:0;right:0;height:52vh;border-right:none;border-top:1px solid var(--border);z-index:100;}
  .app-layout{flex-direction:column;}
  .editor-area{height:calc(48vh - 62px);}
  .sidebar.hidden{display:none;}
}
</style>
</head>
<body>
<div class="bg"><div class="bg-m"></div><div class="bg-g"></div></div>

<nav>
  <a href="dashboard.html" class="nav-logo"><div class="nav-dot"></div>KL <span class="acc">&nbsp;STUDY HUB</span></a>
  <div class="nav-r">
    <span class="save-indicator" id="saveIndicator"><i class="fa fa-circle-check"></i> All saved</span>
    <a href="lost-found.html" class="nav-btn"><i class="fa fa-search"></i> Lost & Found</a>
    <a href="dashboard.html" class="nav-btn"><i class="fa fa-home"></i> Dashboard</a>
  </div>
</nav>

<div class="app-layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-hd">
      <h2>📝 My Notes</h2>
      <button class="new-btn" onclick="newNote()"><i class="fa fa-plus"></i> New Note</button>
      <input class="note-search" id="noteSearch" placeholder="Search notes…" oninput="renderNotesList()">
    </div>
    <div class="notes-list" id="notesList"></div>
  </div>

  <!-- EDITOR -->
  <div class="editor-area" id="editorArea">
    <div class="no-note" id="noNote">
      <div class="nn-icon">📝</div>
      <div>Select a note or create a new one</div>
      <div class="nn-hint">Your notes are saved privately in your browser</div>
    </div>
    <div id="editorPanel" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div class="editor-toolbar">
        <input class="note-title-input" id="noteTitleInput" placeholder="Note title…" oninput="onTitleChange()">
        <span class="word-count" id="wordCount">0 words</span>
        <button class="tb-btn" onclick="copyNote()" title="Copy all"><i class="fa fa-copy"></i></button>
        <button class="tb-btn" onclick="clearNote()" title="Clear content"><i class="fa fa-eraser"></i></button>
      </div>
      <textarea class="note-editor" id="noteEditor" placeholder="Start writing your notes here…&#10;&#10;💡 Your notes auto-save as you type." oninput="onEditorChange()"></textarea>
    </div>
  </div>
</div>

<div class="tw" id="toastWrap"></div>

<script>
const user=JSON.parse(localStorage.getItem("user"));
if(!user)window.location="index.html";

const STORAGE_KEY='kl_notes_'+user.id_no;
let notes=[], activeId=null, saveTimer=null;

function loadNotes(){
  try{notes=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');}
  catch(e){notes=[];}
  renderNotesList();
}

function saveNotes(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(notes));
}

function renderNotesList(){
  const q=document.getElementById('noteSearch').value.toLowerCase();
  const list=document.getElementById('notesList');
  let filtered=notes;
  if(q)filtered=notes.filter(n=>(n.title||'').toLowerCase().includes(q)||(n.content||'').toLowerCase().includes(q));
  if(!filtered.length){
    list.innerHTML=`<div class="empty-notes"><div class="en-icon">${q?'🔍':'📭'}</div>${q?'No notes match your search':'No notes yet. Click + New Note!'}</div>`;
    return;
  }
  list.innerHTML=filtered.map(n=>{
    const preview=(n.content||'').replace(/\n/g,' ').substring(0,55)||'Empty note';
    const dt=new Date(n.updated_at).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
    return`<div class="note-item${n.id===activeId?' active':''}" onclick="openNote('${n.id}')">
      <button class="note-delete" onclick="deleteNote(event,'${n.id}')" title="Delete"><i class="fa fa-trash"></i></button>
      <div class="note-item-title">${n.title||'Untitled Note'}</div>
      <div class="note-item-preview">${preview}</div>
      <div class="note-item-date">${dt}</div>
    </div>`;
  }).join('');
}

function newNote(){
  const n={id:Date.now().toString(),title:'',content:'',created_at:new Date().toISOString(),updated_at:new Date().toISOString()};
  notes.unshift(n);saveNotes();
  openNote(n.id);
  renderNotesList();
  setTimeout(()=>document.getElementById('noteTitleInput').focus(),100);
}

function openNote(id){
  activeId=id;
  const n=notes.find(x=>x.id===id);
  if(!n)return;
  document.getElementById('noNote').style.display='none';
  const panel=document.getElementById('editorPanel');panel.style.display='flex';
  document.getElementById('noteTitleInput').value=n.title||'';
  document.getElementById('noteEditor').value=n.content||'';
  updateWordCount();
  renderNotesList();
}

function onTitleChange(){
  if(!activeId)return;
  const n=notes.find(x=>x.id===activeId);if(!n)return;
  n.title=document.getElementById('noteTitleInput').value;
  n.updated_at=new Date().toISOString();
  scheduleSave();
}

function onEditorChange(){
  if(!activeId)return;
  const n=notes.find(x=>x.id===activeId);if(!n)return;
  n.content=document.getElementById('noteEditor').value;
  n.updated_at=new Date().toISOString();
  updateWordCount();
  scheduleSave();
}

function scheduleSave(){
  const ind=document.getElementById('saveIndicator');
  ind.className='save-indicator';ind.innerHTML='<i class="fa fa-circle-notch fa-spin"></i> Saving…';
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    saveNotes();
    renderNotesList();
    ind.className='save-indicator saved';ind.innerHTML='<i class="fa fa-circle-check"></i> Saved';
  },600);
}

function updateWordCount(){
  const txt=document.getElementById('noteEditor').value;
  const words=txt.trim()?txt.trim().split(/\s+/).length:0;
  document.getElementById('wordCount').textContent=`${words} word${words!==1?'s':''}`;
}

function deleteNote(e,id){
  e.stopPropagation();
  if(!confirm('Delete this note?'))return;
  notes=notes.filter(n=>n.id!==id);
  saveNotes();
  if(activeId===id){
    activeId=null;
    document.getElementById('noNote').style.display='flex';
    document.getElementById('editorPanel').style.display='none';
  }
  renderNotesList();
  showToast('Note deleted 🗑️');
}

function clearNote(){
  if(!activeId)return;
  if(!confirm('Clear all content in this note?'))return;
  document.getElementById('noteEditor').value='';
  onEditorChange();
}

function copyNote(){
  const title=document.getElementById('noteTitleInput').value;
  const content=document.getElementById('noteEditor').value;
  const text=(title?title+'\n\n':'')+content;
  navigator.clipboard.writeText(text).then(()=>showToast('Note copied to clipboard 📋')).catch(()=>showToast('Failed to copy'));
}

function showToast(msg){
  const t=document.createElement('div');t.className='tn';
  t.innerHTML=`<div class="ti">✓</div><div class="tm">${msg}</div>`;
  document.getElementById('toastWrap').appendChild(t);
  setTimeout(()=>{t.classList.add('hiding');t.addEventListener('animationend',()=>t.remove());},2500);
}

loadNotes();
</script>
</body>
</html>
